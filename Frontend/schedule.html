<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedule — ShiftSmart</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <style>
    .sched-legend { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
    .legend-item  { display:flex; align-items:center; gap:6px; font-size:.8rem; font-weight:600; color:var(--subtext); }
    .legend-dot   { width:12px; height:12px; border-radius:3px; }
    .view-toggle  { display:flex; background:var(--muted); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .view-toggle button {
      padding:7px 14px; border:none; background:none;
      font-size:.82rem; font-weight:600; color:var(--subtext);
      cursor:pointer; transition:var(--transition);
    }
    .view-toggle button.active { background:var(--white); color:var(--green); box-shadow:var(--shadow-sm); }
  </style>
</head>
<body>
<div class="app">

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="logo">
        <div class="logo-icon" style="background:var(--green);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
        ShiftSmart
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label" data-i18n="sidebar_main">Main</div>
      <a href="admin.html" id="scheduleSidebarDashboardLink" class="nav-item">
        <i class="fa-solid fa-gauge-high"></i>
        <span data-i18n="sidebar_dashboard">Dashboard</span>
      </a>
      <a href="schedule.html" class="nav-item active">
        <i class="fa-solid fa-calendar-days"></i>
        <span data-i18n="sidebar_schedule">Schedule</span>
      </a>
      <a href="notifications.html" class="nav-item">
        <i class="fa-solid fa-bell"></i>
        <span data-i18n="sidebar_notifications">Notifications</span>
        <span class="badge-pill" id="scheduleNotifCount">0</span>
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label" data-i18n="sidebar_management">Management</div>
      <a href="admin.html" class="nav-item">
        <i class="fa-solid fa-users"></i>
        <span data-i18n="sidebar_users">All Users</span>
      </a>
      <a href="manager.html" class="nav-item">
        <i class="fa-solid fa-briefcase"></i>
        <span data-i18n="sidebar_tasks">Tasks</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span data-i18n="sidebar_settings">Settings</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-green" id="scheduleSidebarInitials">--</div>
        <div class="user-info">
          <div class="user-name" id="scheduleSidebarName">No user loaded</div>
          <div class="user-role" id="scheduleSidebarRole">Admin</div>
        </div>
        <a href="#" onclick="logout(); return false;" style="color:#475569;font-size:.85rem;margin-left:auto">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ════════ TOPBAR ════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div>
        <h1 data-i18n="schedule_title">Weekly Schedule</h1>
        <div class="breadcrumb">Home / <span data-i18n="sidebar_schedule">Schedule</span></div>
      </div>
    </div>
    <div class="topbar-right">
      <!-- Language switcher injected here by i18n.js -->
      <div class="topbar-icon-btn"><i class="fa-solid fa-bell"></i><span class="notif-dot"></span></div>
      <div class="topbar-profile">
        <div class="avatar avatar-green" id="scheduleTopbarInitials">--</div>
        <div>
          <div class="profile-name" id="scheduleTopbarName">No user loaded</div>
          <div class="profile-role" id="scheduleTopbarRole">Admin</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ════════ MAIN ════════ -->
  <main class="main">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <h2 data-i18n="schedule_title">Weekly Schedule</h2>
          <p id="scheduleHeaderLabel">Schedule will appear here when connected.</p>
        </div>
        <div class="page-header-right">
          <button class="btn btn-outline btn-sm"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="btn btn-outline btn-sm" style="padding:7px 14px;font-size:.82rem" data-i18n="today">Today</button>
          <button class="btn btn-outline btn-sm"><i class="fa-solid fa-chevron-right"></i></button>
          <div class="view-toggle">
            <button class="active">Week</button>
            <button>Day</button>
            <button>Month</button>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openModal('addShiftModal')">
            <i class="fa-solid fa-plus"></i>
            <span data-i18n="schedule_add_shift">Add Shift</span>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div class="sched-legend" id="scheduleLegend"></div>
        <div style="display:flex;gap:10px;align-items:center">
          <select class="select-control" style="font-size:.82rem" id="scheduleEmployeeSelect">
            <option>All Employees</option>
          </select>
        </div>
      </div>

      <div class="card fade-in" style="margin-bottom:24px">
        <div class="schedule-container">
          <div class="schedule-grid" id="scheduleGrid"></div>
        </div>
      </div>

      <div class="grid-3">
        <div class="card fade-in">
          <div class="card-header"><h3 data-i18n="schedule_shift_summary">Shift Summary</h3></div>
          <div class="card-body">
            <div style="display:flex;flex-direction:column;gap:10px" id="scheduleSummaryPanel"></div>
          </div>
        </div>
        <div class="card fade-in fade-in-d1">
          <div class="card-header"><h3 data-i18n="schedule_conflicts">Conflicts</h3></div>
          <div class="card-body"><div id="scheduleConflictsPanel"></div></div>
        </div>
        <div class="card fade-in fade-in-d2">
          <div class="card-header"><h3 data-i18n="schedule_staff">Staff on Shift</h3></div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:8px" id="scheduleStaffPanel"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Add Shift Modal -->
<div class="modal-backdrop" id="addShiftModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fa-solid fa-plus-circle" style="color:var(--green);margin-right:8px"></i>Add New Shift</h3>
      <button class="modal-close" onclick="closeModal('addShiftModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="form-group">
      <label>Employee</label>
      <select class="form-control" id="scheduleModalEmployeeSelect"><option value="">Select employee…</option></select>
    </div>
    <div class="form-group">
      <label>Task Title</label>
      <input type="text" class="form-control" id="scheduleModalTitle" placeholder="e.g. Morning Shift"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" class="form-control" id="scheduleModalDate"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" class="form-control" id="scheduleModalStart"/>
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" class="form-control" id="scheduleModalEnd"/>
      </div>
    </div>
    <div id="scheduleModalError" style="display:none;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-top:8px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline" onclick="closeModal('addShiftModal')" data-i18n="cancel">Cancel</button>
      <button class="btn btn-primary" onclick="addShift()"><i class="fa-solid fa-check"></i> Add Shift</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="js/app.js"></script>
<script>
  document.querySelectorAll('.view-toggle button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.view-toggle button').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
    });
  });
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
  function openModal(id)   { document.getElementById(id).classList.add('open'); }
  function closeModal(id)  { document.getElementById(id).classList.remove('open'); }

  function renderSchedulePage() {
    const data = window.getData();
    const helpers = window.helpers;
    const currentUser = data.session.currentUser || {};
    const users = data.users || [];
    const tasks = data.tasks || [];
    const assignments = data.assignments || [];
    const notifications = data.notifications || [];
    const unreadCount = notifications.filter(n => n.status === 'unread').length;
    const employees = users.filter(u => u.role === 'employee');

    const name = currentUser.fullName || 'No user loaded';
    const role = currentUser.role || 'Admin';
    const initials = helpers.initialsFromName(name);

    const dashMap = { admin: 'admin.html', manager: 'manager.html', employee: 'employee.html' };
    document.getElementById('scheduleSidebarDashboardLink').href = dashMap[role] || 'admin.html';

    document.getElementById('scheduleNotifCount').textContent = unreadCount;
    document.getElementById('scheduleSidebarInitials').textContent = initials;
    document.getElementById('scheduleTopbarInitials').textContent = initials;
    document.getElementById('scheduleSidebarName').textContent = name;
    document.getElementById('scheduleTopbarName').textContent = name;
    document.getElementById('scheduleSidebarRole').textContent = role;
    document.getElementById('scheduleTopbarRole').textContent = role;
    document.getElementById('scheduleHeaderLabel').textContent = tasks.length
      ? `${tasks.length} tasks · ${assignments.length} assignments`
      : 'Schedule will appear here when connected.';

    document.getElementById('scheduleEmployeeSelect').innerHTML =
      '<option value="">All Employees</option>' +
      employees.map(u => `<option value="${helpers.escapeHtml(u.id)}">${helpers.escapeHtml(u.fullName)}</option>`).join('');

    document.getElementById('scheduleModalEmployeeSelect').innerHTML =
      '<option value="">Select employee…</option>' +
      employees.map(u => `<option value="${helpers.escapeHtml(u.id)}">${helpers.escapeHtml(u.fullName)}</option>`).join('');

    const schedView = helpers.getScheduleView(tasks);
    const timeSlots  = schedView.timeSlots;

    if (!tasks.length) {
      document.getElementById('scheduleGrid').innerHTML = helpers.emptyState(
        'No schedule events loaded',
        'Tasks and assignments will populate this grid once data is connected.',
        'calendar-days'
      );
    } else {
      const dateMap = {};
      schedView.records.forEach(t => {
        if (!dateMap[t.date]) dateMap[t.date] = [];
        dateMap[t.date].push(t);
      });
      const uniqueDates = Object.keys(dateMap).sort().slice(0, 7);
      const headerHtml = [
        '<div class="sched-header" style="background:var(--muted)">Time</div>',
        ...uniqueDates.map(d => `<div class="sched-header">${helpers.escapeHtml(helpers.formatShortDate(d))}</div>`)
      ].join('');
      const bodyHtml = timeSlots.map(time => {
        const cells = uniqueDates.map((date, idx) => {
          const match = (dateMap[date] || []).find(t => t.startTime && t.startTime.startsWith(time.slice(0,5)));
          if (!match) return '<div class="sched-cell"></div>';
          const tone = ['','blue','purple','orange'][idx % 4];
          const assignee = match.assignedUsers[0]?.fullName || 'Unassigned';
          return `<div class="sched-cell"><div class="sched-event ${tone}"><div>${helpers.escapeHtml(match.title)}</div><div style="font-weight:400;font-size:.7rem">${helpers.escapeHtml(assignee)}</div></div></div>`;
        }).join('');
        return `<div class="sched-time">${helpers.escapeHtml(time)}</div>${cells}`;
      }).join('');
      document.getElementById('scheduleGrid').innerHTML = headerHtml + bodyHtml;
    }

    const confirmed = assignments.filter(a => a.status === 'confirmed').length;
    document.getElementById('scheduleSummaryPanel').innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:.88rem"><span class="text-muted">Total Tasks</span><strong>${tasks.length}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:.88rem"><span class="text-muted">Assignments</span><strong>${assignments.length}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:.88rem"><span class="text-muted">Confirmed</span><strong style="color:var(--green)">${confirmed}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:.88rem"><span class="text-muted">Rejected</span><strong style="color:var(--red)">${assignments.length - confirmed}</strong></div>
    `;

    document.getElementById('scheduleConflictsPanel').innerHTML =
      helpers.emptyState('No conflicts reported', 'Overlap warnings will appear here after live validation runs.', 'shield');

    const assignedEmployeeIds = [...new Set(assignments.map(a => a.employeeId))];
    const staffOnShift = assignedEmployeeIds.map(id => users.find(u => u.id === id)).filter(Boolean);
    document.getElementById('scheduleStaffPanel').innerHTML = staffOnShift.length
      ? staffOnShift.map((person, idx) => `
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="avatar avatar-sm avatar-${helpers.avatarTone(idx)}">${helpers.escapeHtml(helpers.initialsFromName(person.fullName))}</div>
              <span style="font-size:.88rem;font-weight:600">${helpers.escapeHtml(person.fullName)}</span>
            </div>
            <span class="badge badge-confirmed">Scheduled</span>
          </div>
        `).join('')
      : helpers.emptyState('No staff assigned yet', 'Assigned employees will appear here after the schedule is populated.', 'users');
  }

  async function addShift() {
    const employeeId = document.getElementById('scheduleModalEmployeeSelect').value;
    const title      = document.getElementById('scheduleModalTitle').value.trim();
    const date       = document.getElementById('scheduleModalDate').value;
    const startTime  = document.getElementById('scheduleModalStart').value;
    const endTime    = document.getElementById('scheduleModalEnd').value;
    const errEl      = document.getElementById('scheduleModalError');
    errEl.style.display = 'none';
    if (!title || !date || !startTime || !endTime) {
      errEl.textContent = 'Title, date, start time, and end time are required.';
      errEl.style.display = 'block';
      return;
    }
    try {
      const { task } = await window.api.post('/api/tasks', { title, date, startTime, endTime });
      if (employeeId) await window.api.post('/api/assignments', { employeeId, taskId: task.id });
      closeModal('addShiftModal');
      await window.loadAllData();
      renderSchedulePage();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  (async function init() {
    if (!requireAuth()) return;
    await loadAllData();
    renderSchedulePage();
  })();
</script>
</body>
</html>
