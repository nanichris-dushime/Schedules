<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — ShiftSmart</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/api.js"></script>
</head>
<body>
<div class="app">

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="logo">
        <div class="logo-icon" style="background:var(--green);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
        ShiftSmart
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a href="#" id="sidebarDashboardLink" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="schedule.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Schedule</a>
      <a href="notifications.html" class="nav-item active">
        <i class="fa-solid fa-bell"></i> Notifications
        <span class="badge-pill" id="notificationsSidebarCount">0</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-green" id="notificationsSidebarInitials">--</div>
        <div class="user-info">
          <div class="user-name" id="notificationsSidebarName">No user loaded</div>
          <div class="user-role" id="notificationsSidebarRole">--</div>
        </div>
        <a href="#" onclick="logout(); return false;" style="color:#475569;font-size:.85rem;margin-left:auto">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ════════ TOPBAR ════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div>
        <h1>Notifications</h1>
        <div class="breadcrumb">Home / <span>Notifications</span></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon-btn">
        <i class="fa-solid fa-bell"></i>
        <span class="notif-dot" id="topbarNotifDot" style="display:none"></span>
      </div>
      <div class="topbar-profile">
        <div class="avatar avatar-green" id="notificationsTopbarInitials">--</div>
        <div>
          <div class="profile-name" id="notificationsTopbarName">No user loaded</div>
          <div class="profile-role" id="notificationsTopbarRole">--</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ════════ MAIN ════════ -->
  <main class="main">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <h2>Notifications</h2>
          <p id="notificationsSummary">You have <strong style="color:var(--green)">0 unread</strong> notifications</p>
        </div>
        <div class="page-header-right">
          <button class="btn btn-outline btn-sm" onclick="markAllRead()">
            <i class="fa-solid fa-check-double"></i> Mark All Read
          </button>
        </div>
      </div>

      <div class="card fade-in">
        <div class="card-header">
          <div><h3>All Notifications</h3></div>
          <div class="notif-filters">
            <button class="filter-pill active" onclick="filterNotif(this,'all')">All</button>
            <button class="filter-pill" id="unreadFilterBtn" onclick="filterNotif(this,'unread')">Unread (0)</button>
            <button class="filter-pill" onclick="filterNotif(this,'shift')">Shifts</button>
            <button class="filter-pill" onclick="filterNotif(this,'task')">Tasks</button>
            <button class="filter-pill" onclick="filterNotif(this,'system')">System</button>
          </div>
        </div>
        <div class="notif-list" id="notifList"></div>
      </div>

    </div>
  </main>
</div>

<script src="data.js"></script>
<script src="js/app.js"></script>
<script>
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

  // Icon and colour per notification type
  function notifMeta(type) {
    if (type === 'shift') return { icon: 'fa-calendar-check', color: 'green' };
    if (type === 'task')  return { icon: 'fa-list-check',     color: 'blue'  };
    return                       { icon: 'fa-bell',           color: 'yellow' };
  }

  async function readNotif(el) {
    if (!el.classList.contains('unread')) return;
    el.classList.remove('unread');
    const notifId = el.dataset.id;
    if (notifId) await window.api.patch('/api/notifications/' + notifId + '/read').catch(() => {});
    updateUnreadCount();
  }

  async function markAllRead() {
    document.querySelectorAll('.notif-item.unread').forEach(n => n.classList.remove('unread'));
    await window.api.patch('/api/notifications/read-all').catch(() => {});
    updateUnreadCount();
  }

  function updateUnreadCount() {
    const count = document.querySelectorAll('.notif-item.unread').length;
    document.getElementById('notificationsSidebarCount').textContent = count;
    document.getElementById('notificationsSummary').innerHTML =
      `You have <strong style="color:var(--green)">${count} unread</strong> notifications`;
    document.getElementById('unreadFilterBtn').textContent = `Unread (${count})`;
    document.getElementById('topbarNotifDot').style.display = count > 0 ? '' : 'none';
  }

  function filterNotif(btn, cat) {
    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.notif-item').forEach(item => {
      if (cat === 'all')    { item.style.display = ''; return; }
      if (cat === 'unread') { item.style.display = item.classList.contains('unread') ? '' : 'none'; return; }
      item.style.display = item.dataset.type === cat ? '' : 'none';
    });
  }

  function renderNotificationsPage() {
    const data        = window.getData();
    const helpers     = window.helpers;
    const currentUser = data.session.currentUser || {};
    const notifications = data.notifications || [];

    const name     = currentUser.fullName || 'No user loaded';
    const role     = currentUser.role     || '--';
    const initials = helpers.initialsFromName(name);

    // Role-aware dashboard link
    const dashMap = { admin: 'admin.html', manager: 'manager.html', employee: 'employee.html' };
    document.getElementById('sidebarDashboardLink').href = dashMap[role] || 'admin.html';

    document.getElementById('notificationsSidebarInitials').textContent = initials;
    document.getElementById('notificationsTopbarInitials').textContent  = initials;
    document.getElementById('notificationsSidebarName').textContent     = name;
    document.getElementById('notificationsTopbarName').textContent      = name;
    document.getElementById('notificationsSidebarRole').textContent     = role;
    document.getElementById('notificationsTopbarRole').textContent      = role;

    document.getElementById('notifList').innerHTML = notifications.length
      ? notifications.map(item => {
          const meta = notifMeta(item.type || 'system');
          return `
            <div class="notif-item ${item.status === 'unread' ? 'unread' : ''}"
                 data-id="${helpers.escapeHtml(item.id || '')}"
                 data-type="${helpers.escapeHtml(item.type || 'system')}"
                 onclick="readNotif(this)">
              <div class="notif-icon ${meta.color}">
                <i class="fa-solid ${meta.icon}"></i>
              </div>
              <div class="notif-body">
                <p>${helpers.escapeHtml(item.message || 'Notification')}</p>
                <div class="notif-time">
                  <i class="fa-regular fa-clock" style="margin-right:4px"></i>
                  ${helpers.escapeHtml(helpers.formatDate(item.createdAt))}
                </div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
                <span class="badge ${item.status === 'unread' ? 'badge-confirmed' : 'badge-manager'}">
                  ${item.status === 'unread' ? 'Unread' : 'Read'}
                </span>
              </div>
            </div>`;
        }).join('')
      : helpers.emptyState('No notifications yet', 'Notifications will appear here when tasks are created or assignments are made.', 'bell');

    updateUnreadCount();
  }

  (async function init() {
    if (!requireAuth()) return;
    await loadAllData();
    renderNotificationsPage();
  })();
</script>
</body>
</html>
